---
services:
  inkfra-server:
    build:
      context: .
    ports:
      - 8000:8000
    networks:
      - backend
    env_file:
      - .env
    depends_on:
      inkfra-db:
        condition: service_healthy
  inkfra-db:
    image: postgres
    volumes:
      - ./db:/var/lib/postgresql
    env_file:
      - .env
    networks:
      - backend
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  backend:
